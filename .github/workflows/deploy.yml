name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to Hetzner VPS
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}
          command_timeout: 12m
          script: |
            set -e
            if [ ! -f /opt/engine-motivation/.deployed ]; then
              echo "=== INITIAL SETUP ==="
              if [ -d /opt/engine-motivation/.git ]; then
                cd /opt/engine-motivation
                docker compose down -v 2>/dev/null || true
                git fetch origin main
                git reset --hard origin/main
              else
                git clone https://github.com/will383842/Engine_Motivation.git /opt/engine-motivation
                cd /opt/engine-motivation
              fi
              APP_KEY=$(openssl rand -base64 32)
              echo "APP_NAME=\"Motivation Engine\"" > .env.production
              echo "APP_ENV=production" >> .env.production
              echo "APP_KEY=base64:${APP_KEY}" >> .env.production
              echo "APP_DEBUG=false" >> .env.production
              echo "APP_TIMEZONE=UTC" >> .env.production
              echo "APP_URL=https://motivation.life-expat.com" >> .env.production
              echo "APP_LOCALE=fr" >> .env.production
              echo "APP_FALLBACK_LOCALE=en" >> .env.production
              echo "APP_FAKER_LOCALE=fr_FR" >> .env.production
              echo "LOG_CHANNEL=stack" >> .env.production
              echo "LOG_STACK=single" >> .env.production
              echo "LOG_DEPRECATIONS_CHANNEL=null" >> .env.production
              echo "LOG_LEVEL=info" >> .env.production
              echo "DB_CONNECTION=pgsql" >> .env.production
              echo "DB_HOST=mt-postgres" >> .env.production
              echo "DB_PORT=5432" >> .env.production
              echo "DB_DATABASE=motivation_engine" >> .env.production
              echo "DB_USERNAME=motivation" >> .env.production
              echo "DB_PASSWORD=WJullin1974Motiv" >> .env.production
              echo "REDIS_CLIENT=phpredis" >> .env.production
              echo "REDIS_HOST=mt-redis" >> .env.production
              echo "REDIS_PASSWORD=" >> .env.production
              echo "REDIS_PORT=6379" >> .env.production
              echo "QUEUE_CONNECTION=redis" >> .env.production
              echo "CACHE_STORE=redis" >> .env.production
              echo "SESSION_DRIVER=redis" >> .env.production
              echo "SESSION_LIFETIME=120" >> .env.production
              echo "TELEGRAM_BOT_TOKEN=" >> .env.production
              echo "TELEGRAM_ADMIN_CHAT_ID=" >> .env.production
              echo "TELEGRAM_WEBHOOK_SECRET=" >> .env.production
              echo "TWILIO_SID=" >> .env.production
              echo "TWILIO_AUTH_TOKEN=" >> .env.production
              echo "TWILIO_WHATSAPP_FROM=+14155238886" >> .env.production
              echo "FIREBASE_WEBHOOK_SECRET=" >> .env.production
              echo "WHATSAPP_WARMUP_START_DATE=" >> .env.production
              echo "WHATSAPP_DAILY_BUDGET_CENTS=2000" >> .env.production
              echo "WHATSAPP_MONTHLY_BUDGET_CENTS=30000" >> .env.production
              echo 'ADMIN_DEFAULT_PASSWORD=MJMJsblanc19522008/*%$' >> .env.production
              echo "ADMIN_ALERT_EMAIL=williamsjullin@gmail.com" >> .env.production
              echo "ADMIN_ALERT_PHONE=" >> .env.production
              echo "ADMIN_ALLOWED_IPS=" >> .env.production
              echo "MAIL_MAILER=smtp" >> .env.production
              echo "MAIL_HOST=smtp.zoho.eu" >> .env.production
              echo "MAIL_PORT=587" >> .env.production
              echo "MAIL_USERNAME=" >> .env.production
              echo "MAIL_PASSWORD=" >> .env.production
              echo "MAIL_ENCRYPTION=tls" >> .env.production
              echo 'MAIL_FROM_ADDRESS="noreply@motivation.life-expat.com"' >> .env.production
              echo 'MAIL_FROM_NAME="Motivation Engine"' >> .env.production
              cp .env.production .env
              docker compose build --no-cache
              docker compose up -d
              echo "Waiting for PostgreSQL..."
              sleep 10
              docker compose exec -T postgres pg_isready -U motivation || sleep 5
              docker compose exec -T app php artisan migrate --force
              docker compose exec -T app php artisan db:seed --class=AdminUserSeeder --force || true
              docker compose exec -T app php artisan db:seed --class=MessageTemplateSeeder --force || true
              docker compose exec -T app php artisan optimize
              echo "=== SETUP REVERSE PROXY ==="
              if ! command -v nginx &> /dev/null; then
                echo "Installing host nginx..."
                apt-get update -qq && apt-get install -y -qq nginx
                if [ -f /opt/backlink-engine/docker-compose.yml ]; then
                  sed -i 's/"80:80"/"127.0.0.1:8081:80"/' /opt/backlink-engine/docker-compose.yml
                  cd /opt/backlink-engine && docker compose up -d --force-recreate nginx 2>/dev/null && cd /opt/engine-motivation
                fi
                echo 'server { listen 80; server_name backlinks.life-expat.com; client_max_body_size 10M; location / { proxy_pass http://127.0.0.1:8081; proxy_http_version 1.1; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection "upgrade"; proxy_cache_bypass $http_upgrade; } }' > /etc/nginx/sites-available/backlinks
                echo 'server { listen 80; server_name telegram.life-expat.com; client_max_body_size 10M; location / { proxy_pass http://127.0.0.1:8080; proxy_http_version 1.1; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; } }' > /etc/nginx/sites-available/telegram
                echo 'server { listen 80; server_name motivation.life-expat.com; client_max_body_size 10M; location / { proxy_pass http://127.0.0.1:8082; proxy_http_version 1.1; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; } }' > /etc/nginx/sites-available/motivation
                ln -sf /etc/nginx/sites-available/backlinks /etc/nginx/sites-enabled/
                ln -sf /etc/nginx/sites-available/telegram /etc/nginx/sites-enabled/
                ln -sf /etc/nginx/sites-available/motivation /etc/nginx/sites-enabled/
                rm -f /etc/nginx/sites-enabled/default
                nginx -t && systemctl start nginx && systemctl enable nginx
              else
                echo 'server { listen 80; server_name motivation.life-expat.com; client_max_body_size 10M; location / { proxy_pass http://127.0.0.1:8082; proxy_http_version 1.1; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; } }' > /etc/nginx/sites-available/motivation
                ln -sf /etc/nginx/sites-available/motivation /etc/nginx/sites-enabled/
                nginx -t && systemctl reload nginx
              fi
              touch /opt/engine-motivation/.deployed
              echo "=== INITIAL SETUP COMPLETE ==="
              docker ps --filter 'name=mt-' --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}'
            else
              echo "=== DEPLOYING UPDATE ==="
              cd /opt/engine-motivation
              git fetch origin main
              git reset --hard origin/main
              docker compose build --no-cache app
              docker compose up -d --force-recreate app worker worker-whatsapp worker-telegram scheduler nginx
              sleep 5
              docker exec mt-app php artisan optimize:clear
              docker exec mt-app php artisan optimize
              docker exec mt-app php artisan migrate --force
              if [ ! -f /etc/nginx/sites-available/motivation ]; then
                echo "=== SETUP REVERSE PROXY ==="
                if ! command -v nginx > /dev/null 2>&1; then
                  apt-get update -qq && apt-get install -y -qq nginx
                  if [ -f /opt/backlink-engine/docker-compose.yml ]; then
                    grep -q '"80:80"' /opt/backlink-engine/docker-compose.yml && sed -i 's/"80:80"/"127.0.0.1:8081:80"/' /opt/backlink-engine/docker-compose.yml && cd /opt/backlink-engine && docker compose up -d --force-recreate nginx 2>/dev/null && cd /opt/engine-motivation
                  fi
                  printf 'server {\n  listen 80;\n  server_name backlinks.life-expat.com;\n  client_max_body_size 10M;\n  location / {\n    proxy_pass http://127.0.0.1:8081;\n    proxy_http_version 1.1;\n    proxy_set_header Host $host;\n    proxy_set_header X-Real-IP $remote_addr;\n    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;\n    proxy_set_header X-Forwarded-Proto $scheme;\n    proxy_set_header Upgrade $http_upgrade;\n    proxy_set_header Connection "upgrade";\n  }\n}\n' > /etc/nginx/sites-available/backlinks
                  printf 'server {\n  listen 80;\n  server_name telegram.life-expat.com;\n  client_max_body_size 10M;\n  location / {\n    proxy_pass http://127.0.0.1:8080;\n    proxy_http_version 1.1;\n    proxy_set_header Host $host;\n    proxy_set_header X-Real-IP $remote_addr;\n    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;\n    proxy_set_header X-Forwarded-Proto $scheme;\n  }\n}\n' > /etc/nginx/sites-available/telegram
                  ln -sf /etc/nginx/sites-available/backlinks /etc/nginx/sites-enabled/
                  ln -sf /etc/nginx/sites-available/telegram /etc/nginx/sites-enabled/
                  rm -f /etc/nginx/sites-enabled/default
                fi
                printf 'server {\n  listen 80;\n  server_name motivation.life-expat.com;\n  client_max_body_size 10M;\n  location / {\n    proxy_pass http://127.0.0.1:8082;\n    proxy_http_version 1.1;\n    proxy_set_header Host $host;\n    proxy_set_header X-Real-IP $remote_addr;\n    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;\n    proxy_set_header X-Forwarded-Proto $scheme;\n  }\n}\n' > /etc/nginx/sites-available/motivation
                ln -sf /etc/nginx/sites-available/motivation /etc/nginx/sites-enabled/
                nginx -t && systemctl reload nginx 2>/dev/null || systemctl start nginx
                systemctl enable nginx
                echo "Reverse proxy configured"
              fi
              echo "Deploy complete: $(date)"
            fi
